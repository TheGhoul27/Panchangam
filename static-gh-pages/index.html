<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panchangam Static</title>
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
  <main class="page">
    <header class="hero">
      <h1>Panchangam</h1>
      <p>Static site mode with prebuilt JSON snapshots and optional live browser scraping.</p>
    </header>

    <section class="controls card">
      <div class="field">
        <label for="dateInput">Date</label>
        <input id="dateInput" type="date">
      </div>

      <div class="field">
        <label for="cityInput">City</label>
        <select id="cityInput"></select>
      </div>

      <div class="field">
        <label for="modeInput">Mode</label>
        <select id="modeInput">
          <option value="snapshot" selected>Snapshot (recommended)</option>
          <option value="live-direct">Live scrape (direct CORS)</option>
          <option value="live-proxy">Live scrape (CORS proxy)</option>
        </select>
      </div>

      <div class="actions">
        <button id="loadBtn" type="button">Load Panchangam</button>
      </div>
    </section>

    <section id="status" class="status"></section>

    <section class="card">
      <h2 id="title">No data loaded</h2>
      <p id="details"></p>
    </section>

    <section class="grid">
      <article class="card">
        <h3>Panchangam</h3>
        <table id="panchangamTable"></table>
      </article>

      <article class="card">
        <h3>Time to Avoid</h3>
        <table id="avoidTable"></table>
      </article>

      <article class="card">
        <h3>Good Time</h3>
        <table id="goodTable"></table>
      </article>
    </section>

    <footer>
      <small>Courtesy: https://www.panchangam.org/</small>
    </footer>
  </main>

  <script src="assets/app.js"></script>
</body>
</html>
